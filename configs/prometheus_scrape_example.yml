# Example file showing how to add many organizations/services/nodes.
# Copy blocks like these into vmagent_config.yml under scrape_configs.

scrape_configs:
  - job_name: companya-ec2
    scrape_interval: 15s
    static_configs:
      - targets: ["10.0.1.11:9100"]
        labels:
          organization_id: "1001"
          organization_name: "CompanyA"
          service: "ec2"
          node: "ec2-prod-01"
      - targets: ["10.0.1.12:9100"]
        labels:
          organization_id: "1001"
          organization_name: "CompanyA"
          service: "ec2"
          node: "ec2-prod-02"

  - job_name: companyb-ec2
    scrape_interval: 15s
    static_configs:
      - targets: ["10.1.2.21:9100"]
        labels:
          organization_id: "2001"
          organization_name: "CompanyB"
          service: "ec2"
          node: "ec2-test-01"
